name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  federal-procurement:
    name: Federal-procurement guard
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: No internal references in source or tests
        # Fails the build if a development-plan phase number, personal-author
        # attribution, internal document path, or vendor-internal subsystem
        # codename is re-introduced into python/src or python/tests.
        run: scripts/federal_procurement_check.sh

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    defaults:
      run:
        working-directory: python
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (pylint)
        run: pylint src/substrate tests

      - name: Type-check (pyright)
        run: pyright src/substrate tests

      - name: Test (pytest)
        run: pytest

      - name: Doc-count drift check
        # Fail if the counts advertised in README.md have drifted from the tree.
        working-directory: ${{ github.workspace }}
        run: python scripts/check_doc_counts.py

      - name: Health check (python -m substrate)
        run: python -m substrate

      - name: Conformance probes
        run: python -m substrate.conformance --probes ../conformance/probes/

      - name: Examples
        # Every bundled example must run to completion; failures here
        # surface drift between the docs and the implementation early.
        run: |
          for f in examples/0*.py examples/starter_kit/governed_agent.py; do
            echo "::group::$f"
            python "$f"
            echo "::endgroup::"
          done
