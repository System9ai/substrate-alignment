spec: npg-gate-protocol
spec_version: ">=0.1"
scenario: missing-metadata-is-insufficient
required: true
metadata:
  rationale: >
    When metadata is missing for any affected entity, the gate MUST return
    INSUFFICIENT_DATA and surface the missing entities. Silent
    default-to-permissive is NOT conformant.

setup:
  store:
    # Only "a" is seeded; "b" is intentionally absent.
    - { entity_type: user, entity_id: a }

input:
  actor: { entity_type: agent, entity_id: actor-1 }
  action_kind: teach
  affected_entities:
    - { entity_type: user, entity_id: a }
    - { entity_type: user, entity_id: b }
  proposed_outcome: {}

expected:
  verdict: insufficient_data
  missing_count: 1
