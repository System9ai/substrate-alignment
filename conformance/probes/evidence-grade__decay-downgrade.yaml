spec: evidence-grade
spec_version: ">=0.2"
scenario: decay-downgrade
required: true
metadata:
  rationale: >
    When the youngest attestation is older than decay_half_life ×
    decay_multiplier (default 7d × 2 = 14d = 1209600 s), a
    non-floor grade MUST be downgraded by one step (spec § 3 step 7).
    Below the youngest attestation is 1209601 s old (one second past
    threshold); the base ATTESTED grade downgrades to CORROBORATED.

input:
  fn: compose_evidence_grade
  now_epoch_seconds: 1700000000
  attestations:
    - source_id: source-1
      observed_at_epoch_seconds: 1698790399  # _NOW - 1209601s
      provenance_verified: true
    - source_id: source-2
      observed_at_epoch_seconds: 1698790399
      provenance_verified: false

expected:
  grade: corroborated
  attestation_count: 2
  unique_source_count: 2
  provenance_verified_count: 1
