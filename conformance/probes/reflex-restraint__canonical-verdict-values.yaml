spec: reflex-restraint
spec_version: ">=0.1"
scenario: canonical-verdict-values
required: true
metadata:
  rationale: >
    The canonical wire forms of the restraint-verdict enum are stable.
    Conforming implementations in other languages MUST emit these exact
    strings.

input:
  fn: enum_values

expected:
  verdicts:
    - act_reactive
    - restrain
    - de_escalate
    - refuse_hard_limit
    - insufficient_data
