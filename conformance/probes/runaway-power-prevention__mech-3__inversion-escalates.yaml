spec: runaway-power-prevention
spec_version: ">=0.1"
scenario: mech-3__inversion-escalates
required: true
metadata:
  mechanism: 3
  rationale: >
    Mechanism 3, HaltAndEscalate. An INVERSION_DETECTED observation
    MUST escalate the agent (180° inversion is one of the six halt
    triggers).

input:
  mechanism: halt-and-escalate
  agent_id: agent-1
  current_state: operating
  observations:
    - { halt_reason: inversion_detected, severity: 0.9 }

expected:
  next_state: escalated
  refuses_consequential_action: true
