spec: evidence-grade
spec_version: ">=0.2"
scenario: documented-crystallized
required: true
metadata:
  rationale: >
    Three or more distinct-source attestations with at least one
    verified provenance and a recent youngest attestation MUST
    classify as DOCUMENTED_CRYSTALLIZED (spec § 3 step 6 rule d).

input:
  fn: compose_evidence_grade
  now_epoch_seconds: 1700000000
  attestations:
    - source_id: source-1
      observed_at_epoch_seconds: 1700000000
      provenance_verified: true
    - source_id: source-2
      observed_at_epoch_seconds: 1700000000
      provenance_verified: false
    - source_id: source-3
      observed_at_epoch_seconds: 1700000000
      provenance_verified: false

expected:
  grade: documented_crystallized
  attestation_count: 3
  unique_source_count: 3
  provenance_verified_count: 1
