spec: evidence-grade
spec_version: ">=0.2"
scenario: two-sources-corroborated
required: true
metadata:
  rationale: >
    Two attestations from distinct sources without verified provenance
    MUST classify as CORROBORATED (spec § 3 step 6 rule c).

input:
  fn: compose_evidence_grade
  now_epoch_seconds: 1700000000
  attestations:
    - source_id: source-1
      observed_at_epoch_seconds: 1700000000
      provenance_verified: false
    - source_id: source-2
      observed_at_epoch_seconds: 1700000000
      provenance_verified: false

expected:
  grade: corroborated
  attestation_count: 2
  unique_source_count: 2
  provenance_verified_count: 0
