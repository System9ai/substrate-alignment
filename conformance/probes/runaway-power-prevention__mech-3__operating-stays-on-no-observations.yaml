spec: runaway-power-prevention
spec_version: ">=0.1"
scenario: mech-3__operating-stays-on-no-observations
required: true
metadata:
  mechanism: 3
  rationale: >
    Mechanism 3, HaltAndEscalate. With no triggering observations,
    an OPERATING agent MUST stay in OPERATING and MUST NOT refuse
    consequential action.

input:
  mechanism: halt-and-escalate
  agent_id: agent-1
  current_state: operating
  observations: []

expected:
  next_state: operating
  refuses_consequential_action: false
