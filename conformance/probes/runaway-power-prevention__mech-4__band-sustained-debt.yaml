spec: runaway-power-prevention
spec_version: ">=0.2"
scenario: mech-4__band-sustained-debt
required: true
metadata:
  mechanism: 4
  rationale: >
    Layered-model temporal contract. Sustained operation above the
    φ-conjugate debt line (1/φ ≈ 0.618) MUST accrue compensation debt —
    a classification or alarm alone is non-conforming; the
    implementation must expose accrued debt units so a compensation
    path (peer pickup / recovery / capacity grant / escalation) can
    repay them.

input:
  mechanism: sustained-load
  utilization_sequence: [0.70, 0.70, 0.70, 0.70]

expected:
  trend: debt_accruing
  debt_accrued: true
