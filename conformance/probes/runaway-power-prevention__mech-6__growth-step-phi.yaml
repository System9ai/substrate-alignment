spec: runaway-power-prevention
spec_version: ">=0.2"
scenario: mech-6__growth-step-phi
required: true
metadata:
  mechanism: 6
  rationale: >
    Layered-model growth discipline (feeds mechanism 6, runaway-power
    prevention): capacity growth steps at most φ (~1.618x) per step
    with consolidation between steps. A 2.5x step exceeds the φ ratio , 
    "rise too fast and you topple", and MUST be flagged
    within_phi=false. The assessment informs; gating is the caller's.

input:
  mechanism: growth-step
  current_capacity: 100.0
  proposed_capacity: 250.0

expected:
  within_phi: false
